<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>游戏</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
body {
  background: #ffffff;
  padding-top: 60px;
}
.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 24px;
  color: #007aff;
  text-decoration: none;
  z-index: 999;
}
.app-wrap {
  padding: 20px 15px;
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 25px 10px;
}
.app-item {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.app-item img {
  width: 60px;
  height: 60px;
  border-radius: 14px;
  object-fit: cover;
}
.app-item span {
  font-size: 12px;
  color: #333;
  margin-top: 6px;
}
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal-box {
  background: #fff;
  width: 85%;
  max-width: 340px;
  border-radius: 20px;
  padding: 25px 20px;
  position: relative;
  text-align: center;
}
.close-x {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 22px;
  color: #999;
  cursor: pointer;
}
.modal-avatar {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
  margin: 0 auto 15px;
  background: #f2f2f7;
}
.acc-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 12px 15px;
  margin: 15px 0;
}
.acc-text {
  font-size: 15px;
  word-break: break-all;
}
.copy-btn {
  background: #007aff;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
}
</style>
</head>
<body>
<a href="index.html" class="back-btn">←</a>

<div class="app-wrap">
  <div class="app-item" onclick="openPop('steam')">
    <img src="steam.png">
    <span>Steam</span>
  </div>
  <div class="app-item" onclick="openPop('epic')">
    <img src="epic.png">
    <span>Epic</span>
  </div>
  <div class="app-item" onclick="openPop('xbox')">
    <img src="xbox.png">
    <span>Xbox</span>
  </div>
  <div class="app-item" onclick="openPop('naruto')">
    <img src="naruto.png">
    <span>火影忍者</span>
  </div>
  <div class="app-item" onclick="openPop('wangzhe')">
    <img src="wangzhe.png">
    <span>王者荣耀</span>
  </div>
</div>

<div class="modal" id="modal" onclick="closePopBg(event)">
  <div class="modal-box">
    <span class="close-x" onclick="closePop()">×</span>
    <img class="modal-avatar" id="popAvatar" src="">
    <div id="popTitle" style="font-size:18px;font-weight:600;margin-bottom:10px;"></div>
    <div class="acc-row">
      <span class="acc-text" id="popAcc"></span>
      <button class="copy-btn" onclick="copyAcc()">复制</button>
    </div>
  </div>
</div>

<script>
const info = {
  steam:{name:'Steam',acc:'1559561177'},
  epic:{name:'Epic',acc:'@食堂打烊'},
  xbox:{name:'Xbox',acc:'@dhring8295'},
  naruto:{name:'火影忍者',acc:'v区 昵称食堂打烊 id:24175522072'},
  wangzhe:{name:'王者荣耀',acc:'q区 id：堂打烊'}
};
let nowAcc = '';
function openPop(key){
  let d = info[key];
  nowAcc = d.acc;
  document.getElementById('popTitle').innerText = d.name;
  document.getElementById('popAcc').innerText = d.acc;
  document.getElementById('modal').style.display = 'flex';
}
function closePop(){
  document.getElementById('modal').style.display = 'none';
}
function closePopBg(e){
  if(e.target.id === 'modal') closePop();
}
function copyAcc(){
  navigator.clipboard.writeText(nowAcc).then(()=>alert('已复制'));
}
</script>
</body>
</html>
