<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>通讯</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
body {
  background: #fff;
  padding-top: 60px;
}
/* 返回按钮 */
.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 24px;
  color: #007aff;
  text-decoration: none;
  z-index: 999;
}
/* App 桌面布局 手机专用 */
.app-wrap {
  padding: 20px 15px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 25px 10px;
}
.app-item {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.app-item img {
  width: 60px;
  height: 60px;
  border-radius: 14px;
  object-fit: cover;
}
.app-item span {
  font-size: 12px;
  color: #333;
  margin-top: 6px;
}
/* 弹窗遮罩 */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal-box {
  background: #fff;
  width: 85%;
  max-width: 340px;
  border-radius: 20px;
  padding: 25px 20px;
  position: relative;
  text-align: center;
}
.close-x {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 22px;
  color: #999;
  cursor: pointer;
}
.modal-avatar {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
  margin: 0 auto 15px;
  background: #f2f2f7;
}
.acc-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 12px 15px;
  margin: 15px 0;
}
.acc-text {
  font-size: 15px;
  word-break: break-all;
}
.copy-btn {
  background: #007aff;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
}
.qr-img {
  width: 140px;
  height: 140px;
  margin-top: 10px;
  border-radius: 12px;
  display: none;
}
</style>
</head>
<body>

<a href="index.html" class="back-btn">←</a>

<!-- 纯App图标列表 打开页面直接就是这个 -->
<div class="app-wrap">
  <div class="app-item" onclick="openPop('wechat')">
    <img src="wechat_icon.png">
    <span>微信</span>
  </div>
  <div class="app-item" onclick="openPop('qq')">
    <img src="qq_icon.png">
    <span>QQ</span>
  </div>
  <div class="app-item" onclick="openPop('tg')">
    <img src="telegram_icon.png">
    <span>Telegram</span>
  </div>
  <div class="app-item" onclick="openPop('email')">
    <img src="email_icon.png">
    <span>QQ邮箱</span>
  </div>
  <div class="app-item" onclick="openPop('outlook')">
    <img src="outlook_icon.png">
    <span>Outlook</span>
  </div>
  <div class="app-item" onclick="openPop('gmail')">
    <img src="gmail_icon.png">
    <span>Gmail</span>
  </div>
</div>

<!-- 弹窗 -->
<div class="modal" id="modal" onclick="closePopBg(event)">
  <div class="modal-box">
    <span class="close-x" onclick="closePop()">×</span>
    <img class="modal-avatar" id="popAvatar" src="">
    <div id="popTitle" style="font-size:18px;font-weight:600;"></div>
    <div class="acc-row">
      <span class="acc-text" id="popAcc"></span>
      <button class="copy-btn" onclick="copyAcc()">复制</button>
    </div>
    <img class="qr-img" id="popQr" src="">
  </div>
</div>

<script>
const info = {
  wechat: {name:'微信',acc:'Dininghallrests',qr:'wechat.png'},
  qq: {name:'QQ',acc:'2152966253',qr:'qq.png'},
  tg: {name:'Telegram',acc:'@Dininghallrests',qr:'telegram.png'},
  email: {name:'QQ邮箱',acc:'2152966253@qq.com'},
  outlook: {name:'Outlook',acc:'m2152966253@outlook.com'},
  gmail: {name:'Gmail',acc:'jiba3687@gmail.com'}
};
let nowAcc = '';

function openPop(key){
  let d = info[key];
  nowAcc = d.acc;
  document.getElementById('popTitle').innerText = d.name;
  document.getElementById('popAcc').innerText = d.acc;
  // 头像预留 你以后放头像改src就行
  document.getElementById('popAvatar').src = '';
  // 二维码
  let qr = document.getElementById('popQr');
  if(d.qr){
    qr.src = d.qr;
    qr.style.display = 'block';
  }else{
    qr.style.display = 'none';
  }
  document.getElementById('modal').style.display = 'flex';
}
function closePop(){
  document.getElementById('modal').style.display = 'none';
}
function closePopBg(e){
  if(e.target.id === 'modal') closePop();
}
function copyAcc(){
  navigator.clipboard.writeText(nowAcc).then(()=>alert('已复制'));
}
</script>

</body>
</html>
