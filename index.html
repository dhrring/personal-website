<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丁浩睿 - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #1d1d1f;
            line-height: 1.6;
        }

        /* 个人介绍区域 */
        .profile-section {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
        }

        .profile-left {
            flex: 1;
        }

        .name-en {
            font-size: 22px;
            color: #007aff;
            font-weight: 500;
        }

        .name-cn {
            font-size: 48px;
            font-weight: 700;
            margin: 5px 0 25px;
        }

        .info-item {
            font-size: 19px;
            margin: 12px 0;
            display: flex;
            align-items: center;
        }

        .info-title {
            width: 100px;
            font-weight: 500;
        }

        .info-content {
            color: #007aff;
            font-weight: 600;
            position: relative;
            display: inline;
        }

        /* 荧光高光效果 */
        .highlight {
            position: relative;
            z-index: 0;
        }

        .highlight::after {
            content: "";
            position: absolute;
            bottom: 2px;
            left: 0;
            height: 10px;
            width: 100%;
            background-color: rgba(0, 122, 255, 0.15);
            z-index: -1;
            border-radius: 4px;
        }

        .big-text {
            font-size: 32px;
            font-weight: 600;
            margin-top: 40px;
            color: #1d1d1f;
        }

        .profile-right {
            width: 280px;
            height: 370px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .profile-right img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 账号四宫格 */
        .account-section {
            max-width: 1000px;
            margin: 0 auto 80px;
            padding: 0 20px;
        }

        .section-title {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
            color: #007aff;
        }

        .grid-box {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .grid-item {
            background: #f5f5f7;
            border-radius: 20px;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #1d1d1f;
        }

        .grid-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.08);
        }

        .grid-item img {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            margin-bottom: 16px;
            object-fit: cover;
        }

        .grid-item h3 {
            font-size: 22px;
            font-weight: 600;
        }

        /* 子页面通用样式 */
        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            width: 44px;
            height: 44px;
            background: #f2f2f7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            z-index: 999;
            text-decoration: none;
            color: #007aff;
        }

        .app-container {
            max-width: 900px;
            margin: 100px auto;
            padding: 0 20px;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .app-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 8px;
        }

        .app-name {
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-content {
            background: white;
            width: 380px;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            text-align: center;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 18px;
            font-size: 22px;
            cursor: pointer;
            color: #888;
        }

        .modal-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 15px;
        }

        .account-box {
            border: 2px solid #e5e5ea;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 17px;
            font-weight: 500;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        /* 二维码 */
        .qrcode {
            width: 160px;
            height: 160px;
            margin: 10px auto;
            object-fit: cover;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<!-- ===================== 主页 - 个人介绍 ===================== -->
<div class="profile-section">
    <div class="profile-left">
        <div class="name-en">Ding Haorui</div>
        <div class="name-cn">丁浩睿</div>

        <div class="info-item">
            <div class="info-title">出生日期</div>
            <div class="info-content highlight">和我同一天</div>
        </div>
        <div class="info-item">
            <div class="info-title">年龄</div>
            <div class="info-content highlight">和我一样大</div>
        </div>
        <div class="info-item">
            <div class="info-title">住址</div>
            <div class="info-content highlight">我家</div>
        </div>
        <div class="info-item">
            <div class="info-title">单位</div>
            <div class="info-content highlight">河南大学附属中学</div>
        </div>

        <div class="big-text">好像确实没有什么可以写的😂</div>
    </div>

    <div class="profile-right">
        <img src="avatar.jpg" alt="头像">
    </div>
</div>

<!-- ===================== 主页 - 账号四宫格 ===================== -->
<div class="account-section">
    <div class="section-title">我的账号</div>
    <div class="grid-box">
        <a href="messaging.html" class="grid-item">
            <img src="messaging.png" alt="通讯">
            <h3>通讯</h3>
        </a>
        <a href="games.html" class="grid-item">
            <img src="games.png" alt="游戏">
            <h3>游戏</h3>
        </a>
        <a href="social.html" class="grid-item">
            <img src="social.png" alt="社交">
            <h3>社交</h3>
        </a>
        <a href="opensource.html" class="grid-item">
            <img src="opensource.png" alt="开源平台">
            <h3>开源平台</h3>
        </a>
    </div>
</div>

</body>
</html>
