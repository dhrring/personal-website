<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>开源平台</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
body {
  background: #ffffff;
  padding-top: 60px;
}
.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 24px;
  color: #007aff;
  text-decoration: none;
  z-index: 999;
}
.app-wrap {
  padding: 20px 15px;
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 25px 10px;
  /* 入场动画容器 */
  animation: fadeIn 0.5s ease-out;
}
/* 入场动画 */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.app-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  /* 卡片hover动画 */
  transition: transform 0.2s ease;
  cursor: pointer;
}
.app-item:hover {
  transform: scale(1.05);
}
.app-item img {
  width: 60px;
  height: 60px;
  border-radius: 14px;
  object-fit: cover;
}
.app-item span {
  font-size: 12px;
  color: #333;
  margin-top: 6px;
}
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  /* 弹窗入场动画 */
  animation: modalFade 0.3s ease-out;
}
@keyframes modalFade {
  from { opacity: 0; }
  to { opacity: 1; }
}
.modal-box {
  background: #fff;
  width: 85%;
  max-width: 340px;
  border-radius: 20px;
  padding: 25px 20px;
  position: relative;
  text-align: center;
  /* 弹窗缩放动画 */
  animation: modalScale 0.3s ease-out;
}
@keyframes modalScale {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.close-x {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 22px;
  color: #999;
  cursor: pointer;
  transition: color 0.2s ease;
}
.close-x:hover {
  color: #007aff;
}
.modal-avatar {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
  margin: 0 auto 15px;
  background: #f2f2f7;
  /* 头像边框 */
  border: 2px solid #f0f0f5;
}
.acc-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 12px 15px;
  margin: 15px 0;
  transition: border-color 0.2s ease;
}
.acc-row:hover {
  border-color: #007aff;
}
.acc-text {
  font-size: 15px;
  word-break: break-all;
}
.copy-btn {
  background: #007aff;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s ease;
}
.copy-btn:hover {
  background: #0066e0;
}
/* 适配电脑端 */
@media (min-width: 768px) {
  .app-wrap {
    grid-template-columns: repeat(6, 1fr);
    max-width: 1000px;
    margin: 0 auto;
  }
  .modal-box {
    max-width: 400px;
  }
}
</style>
</head>
<body>
<a href="index.html" class="back-btn">←</a>

<div class="app-wrap">
  <div class="app-item" onclick="openPop('github')">
    <img src="github.png" alt="GitHub图标">
    <span>GitHub</span>
  </div>
  <div class="app-item" onclick="openPop('lckj')">
    <img src="lckj.png" alt="立创开源图标">
    <span>立创开源</span>
  </div>
</div>

<div class="modal" id="modal" onclick="closePopBg(event)">
  <div class="modal-box">
    <span class="close-x" onclick="closePop()">×</span>
    <img class="modal-avatar" id="popAvatar" src="" alt="平台头像">
    <div id="popTitle" style="font-size:18px;font-weight:600;margin-bottom:10px;"></div>
    <div class="acc-row">
      <span class="acc-text" id="popAcc"></span>
      <button class="copy-btn" onclick="copyAcc()">复制</button>
    </div>
  </div>
</div>

<script>
const info = {
  github:{
    name:'GitHub',
    acc:'DHRRING',
    avatar: 'github.png' // 自定义头像
  },
  lckj:{
    name:'立创开源硬件平台',
    acc:'dininghallrests',
    avatar: 'lckj.png' // 自定义头像
  }
};
let nowAcc = '';

function openPop(key){
  let d = info[key];
  nowAcc = d.acc;
  // 设置标题和账号
  document.getElementById('popTitle').innerText = d.name;
  document.getElementById('popAcc').innerText = d.acc;
  // 设置自定义头像
  document.getElementById('popAvatar').src = d.avatar;
  // 显示弹窗
  document.getElementById('modal').style.display = 'flex';
}

function closePop(){
  document.getElementById('modal').style.display = 'none';
}

function closePopBg(e){
  if(e.target.id === 'modal') closePop();
}

function copyAcc(){
  // 只复制ID（纯账号内容）
  navigator.clipboard.writeText(nowAcc).then(()=>{
    // 美化提示（替换alert为更友好的样式，保留兼容性）
    const tip = document.createElement('div');
    tip.style.cssText = `
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 9999;
      animation: fadeOut 1.5s ease-out;
    `;
    tip.innerText = '已复制';
    document.body.appendChild(tip);
    setTimeout(() => tip.remove(), 1500);
  }).catch(()=>{
    alert('复制失败，请手动复制');
  });
}

// 适配电脑端点击外区域关闭（增强）
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') closePop();
});
</script>
</body>
</html>
